name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: gosh

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARTIFACT="${BINARY_NAME}-v${VERSION}-${{ matrix.target }}"
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" staging/
          tar -czf "${ARTIFACT}.tar.gz" -C staging "${BINARY_NAME}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ARTIFACT}.tar.gz" > "${ARTIFACT}.tar.gz.sha256"
          else
            shasum -a 256 "${ARTIFACT}.tar.gz" > "${ARTIFACT}.tar.gz.sha256"
          fi
          echo "ARTIFACT=${ARTIFACT}.tar.gz" >> "$GITHUB_ENV"
          echo "CHECKSUM_FILE=${ARTIFACT}.tar.gz.sha256" >> "$GITHUB_ENV"
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ env.ARTIFACT }}
            ${{ env.CHECKSUM_FILE }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate manifest.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          declare -A CHECKSUMS
          declare -A ARCHIVES
          for sha_file in artifacts/*.sha256; do
            hash=$(awk '{print $1}' "$sha_file")
            archive=$(awk '{print $2}' "$sha_file")
            target=$(echo "$archive" | sed -E "s/^${BINARY_NAME}-v[^-]+-//" | sed -E 's/\.(tar\.gz|zip)$//')
            CHECKSUMS["$target"]="$hash"
            ARCHIVES["$target"]="$archive"
          done

          cat > artifacts/manifest.json <<MANIFEST
          {
            "version": "${VERSION}",
            "format_version": 1,
            "requires": {},
            "artifacts": {
          MANIFEST

          first=true
          for target in "${!CHECKSUMS[@]}"; do
            if [ "$first" = true ]; then
              first=false
            else
              echo "," >> artifacts/manifest.json
            fi
            cat >> artifacts/manifest.json <<ENTRY
              "$target": {
                "sha256": "${CHECKSUMS[$target]}",
                "archive": "${ARCHIVES[$target]}"
              }
          ENTRY
          done

          cat >> artifacts/manifest.json <<TAIL
            }
          }
          TAIL

          python3 -m json.tool artifacts/manifest.json > artifacts/manifest_pretty.json \
            && mv artifacts/manifest_pretty.json artifacts/manifest.json

          echo "Generated manifest.json:"
          cat artifacts/manifest.json

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*
